name: Build and Push Docker Image - github-runner

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    paths:
      - .github/workflows/github-runner.yml
      - github-runner/Dockerfile
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Github Packages
        run: echo ${GITHUB_TOKEN} | docker login -u ${GITHUB_ACTOR} --password-stdin ghcr.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push the Docker image
        env:
          IMAGE: github-runner
        run: |
          cd ./${IMAGE}
          docker build . --file Dockerfile --tag ${IMAGE}

          docker tag ${IMAGE} "ghcr.io/${{ github.repository_owner }}/${IMAGE}:latest"
          docker push "ghcr.io/${{ github.repository_owner }}/${IMAGE}:latest"

          docker tag ${IMAGE} "ghcr.io/${{ github.repository_owner }}/${IMAGE}:$(date +%s)"
          docker push "ghcr.io/${{ github.repository_owner }}/${IMAGE}:$(date +%s)"
